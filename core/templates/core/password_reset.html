{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser | OctaScraper</title>
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body class="centered-body">
    <div class="container animate-fade-in" style="max-width: 500px;">
        <h2>Réinitialisation</h2>
        <p style="margin-bottom: 2rem; color: var(--text-muted);">Entrez votre email pour recevoir un lien de réinitialisation.</p>
        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <input type="email" name="email" placeholder="email@exemple.com" required style="flex: 1; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;">
            </div>
            <button type="submit" style="width: 100%; justify-content: center; margin-top: 1.5rem;">Envoyer le lien</button>
        </form>
    </div>
</body>
</html>
